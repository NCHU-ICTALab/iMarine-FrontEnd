<div class="cols">
  <div class="stack">
    <div class="route anim" style="--d:.1s">
      <canvas id="routeCv"></canvas>
      <span class="cap" style="position:absolute;top:12px;left:14px;font-size:11px;font-family:var(--mono);letter-spacing:.12em;color:var(--ink-40);z-index:3">__CAP__</span>
    </div>
    <div class="tseq anim" style="--d:.15s">
      <!--PORTS-->
    </div>
  </div>
  <div class="stack">
    <div class="panel lg anim" data-lg style="--d:.2s">
      <div class="risk-big">
        <div class="risk-ring">__RISK__</div>
        <div><b style="font-size:15px" class="amberc">__LEVEL__</b>
          <div style="font-size:12px" class="mut">__FACTORLBL__</div></div>
      </div>
      <div class="factor">
        <!--FACTORS-->
      </div>
      <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">
        <span class="pill rose">WHO 正式通報</span><span class="pill gold">CDC 公告</span><span class="pill dim">媒體 2 則</span>
      </div>
    </div>
    <div class="panel lg lg-static anim" style="--d:.25s">
      <h4>防護建議</h4>
      <div style="font-size:13px;color:var(--ink-60);display:flex;flex-direction:column;gap:6px">
        <!--ADVICE-->
      </div>
    </div>
    <div class="panel lg lg-static anim" style="--d:.3s">
      <h4>參考案例</h4>
      <div style="font-size:12.5px" class="mut">__REFERENCE__</div>
    </div>
  </div>
</div>
