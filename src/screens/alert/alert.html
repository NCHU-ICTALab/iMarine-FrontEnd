<div class="anim" style="--d:.05s"><!--STATS--></div>
<div class="cols">
  <div>
    <div class="fbar anim" style="--d:.08s">
      <button class="fchip is-on" data-cat="all">全部</button>
      <button class="fchip" data-cat="epi">疫情</button>
      <button class="fchip" data-cat="wx">氣象</button>
      <button class="fchip" data-cat="ok">解除</button>
    </div>
    <div class="feed">
      <!--FEED-->
    </div>
  </div>
  <div class="stack">
    <div class="phone anim" style="--d:.2s" id="phoneMock">
      <div class="notch"></div>
      <div class="ptime">19:36</div>
      <div class="pdate">7月3日 星期五 · 高雄港區</div>
      <div id="phoneScr">
        <!--SMS-->
      </div>
    </div>
    <div class="panel lg lg-static anim" style="--d:.25s">
      <h4>推播規則</h4>
      <div style="display:flex;flex-direction:column;gap:10px;">
        <label class="lg-switch"><input type="checkbox" checked><span class="lg-switch__track"><span class="lg-switch__thumb"></span></span>疫情橙級以上自動推播</label>
        <label class="lg-switch"><input type="checkbox" checked><span class="lg-switch__track"><span class="lg-switch__thumb"></span></span>強降雨 / 強風即時警報</label>
        <label class="lg-switch"><input type="checkbox"><span class="lg-switch__track"><span class="lg-switch__thumb"></span></span>夜間免打擾（值班除外）</label>
      </div>
    </div>
  </div>
</div>
