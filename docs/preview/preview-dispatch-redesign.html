<title>短時微氣候 · 即時派工建議 · Dispatch 頁改版範例</title>
<style>
/*!
 * Liquid Glass Kit v0.1 — 樣式層
 * 設計 tokens / 玻璃材質 / 元件 / 降級 / 無障礙
 *
 * 兩種渲染模式(由 liquid-glass.js 在 <html> 上標記):
 *   html.lg-full      Chromium:JS 以 backdrop-filter:url(#filter) 注入折射
 *   html.lg-fallback  其他瀏覽器:CSS 磨砂玻璃 (blur + saturate)
 */

/* ==================================================================== *
 * 1. 設計 Tokens
 * ==================================================================== */
:root {
  /* 材質 */
  --lg-tint: rgba(255, 255, 255, 0.10);
  --lg-tint-strong: rgba(255, 255, 255, 0.34);
  --lg-stroke: rgba(255, 255, 255, 0.50);
  --lg-stroke-soft: rgba(255, 255, 255, 0.22);
  --lg-blur-fallback: 22px;
  --lg-saturate-fallback: 1.7;

  /* 鏡面高光(rim light,光源在左上) */
  --lg-rim-hi: rgba(255, 255, 255, 0.90);
  --lg-rim-lo: rgba(255, 255, 255, 0.38);
  --lg-sheen: rgba(255, 255, 255, 0.45);

  /* 陰影:玻璃浮在內容之上的深度 */
  --lg-shadow:
    0 18px 44px rgba(22, 32, 52, 0.28),
    0 3px 10px rgba(22, 32, 52, 0.14);
  --lg-shadow-soft:
    0 8px 22px rgba(22, 32, 52, 0.20),
    0 1px 4px rgba(22, 32, 52, 0.10);

  /* 文字 */
  --lg-text: #1c2536;
  --lg-text-dim: rgba(28, 37, 54, 0.64);
  --lg-text-invert: #f4f7fc;

  /* 強調色(預設取自莫內畫中的珊瑚紅胸花,可整體替換) */
  --lg-accent: #cf6045;
  --lg-accent-soft: rgba(207, 96, 69, 0.16);
  --lg-on-accent: #fff8f3;

  /* 漲跌(儀表板 delta) */
  --lg-up: #1f9e63;
  --lg-up-soft: rgba(31, 158, 99, 0.16);
  --lg-down: #d2503e;
  --lg-down-soft: rgba(210, 80, 62, 0.16);

  /* 圓角 */
  --lg-radius-xs: 14px;
  --lg-radius-s: 12px;
  --lg-radius-m: 20px;
  --lg-radius-l: 28px;
  --lg-radius-pill: 999px;

  /* 動態:液態回彈 */
  --lg-speed: 0.34s;
  --lg-ease: cubic-bezier(0.34, 1.3, 0.4, 1);
  --lg-ease-out: cubic-bezier(0.22, 0.8, 0.3, 1);

  /* 字體 */
  --lg-font: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI",
    "PingFang TC", "Noto Sans TC", "Microsoft JhengHei", sans-serif;
}

/* 暗色:手動 data-lg-theme="dark",或跟隨系統 */
[data-lg-theme="dark"] {
  --lg-tint: rgba(16, 21, 32, 0.32);
  --lg-tint-strong: rgba(16, 21, 32, 0.55);
  --lg-stroke: rgba(255, 255, 255, 0.28);
  --lg-stroke-soft: rgba(255, 255, 255, 0.12);
  --lg-rim-hi: rgba(255, 255, 255, 0.55);
  --lg-rim-lo: rgba(255, 255, 255, 0.18);
  --lg-sheen: rgba(255, 255, 255, 0.22);
  --lg-text: #eef2f9;
  --lg-text-dim: rgba(238, 242, 249, 0.62);
  --lg-up: #46c98a;
  --lg-up-soft: rgba(70, 201, 138, 0.18);
  --lg-down: #f08374;
  --lg-down-soft: rgba(240, 131, 116, 0.18);
  --lg-shadow:
    0 18px 48px rgba(0, 0, 0, 0.50),
    0 3px 10px rgba(0, 0, 0, 0.30);
}
@media (prefers-color-scheme: dark) {
  :root:not([data-lg-theme]) {
    --lg-tint: rgba(16, 21, 32, 0.32);
    --lg-tint-strong: rgba(16, 21, 32, 0.55);
    --lg-stroke: rgba(255, 255, 255, 0.28);
    --lg-stroke-soft: rgba(255, 255, 255, 0.12);
    --lg-rim-hi: rgba(255, 255, 255, 0.55);
    --lg-rim-lo: rgba(255, 255, 255, 0.18);
    --lg-sheen: rgba(255, 255, 255, 0.22);
    --lg-text: #eef2f9;
    --lg-text-dim: rgba(238, 242, 249, 0.62);
    --lg-up: #46c98a;
    --lg-up-soft: rgba(70, 201, 138, 0.18);
    --lg-down: #f08374;
    --lg-down-soft: rgba(240, 131, 116, 0.18);
  }
}

/* ==================================================================== *
 * 2. 玻璃基底  .lg
 *    結構:tint 底色 + ::before 鏡面 rim light + ::after 動態光澤
 *    折射(lg-full)由 JS 對加了 data-lg 的元素注入 backdrop-filter
 * ==================================================================== */
.lg {
  position: relative;
  border-radius: var(--lg-radius-m);
  background: var(--lg-tint);
  box-shadow: var(--lg-shadow);
  color: var(--lg-text);
  isolation: isolate;
}

/* 降級模式,以及刻意不折射的輕量玻璃 .lg-static */
html.lg-fallback .lg,
.lg-static {
  -webkit-backdrop-filter: blur(var(--lg-blur-fallback)) saturate(var(--lg-saturate-fallback));
  backdrop-filter: blur(var(--lg-blur-fallback)) saturate(var(--lg-saturate-fallback));
}

/* 降級模式下 regular 材質加重磨砂(特異度 0,3,0 > 上方 0,2,1,穩勝) */
html.lg-fallback .lg--regular,
html.lg-fallback .lg.lg--regular {
  -webkit-backdrop-filter: blur(calc(var(--lg-blur-fallback) * 1.7)) saturate(1.2);
  backdrop-filter: blur(calc(var(--lg-blur-fallback) * 1.7)) saturate(1.2);
}

/* 鏡面高光:左上亮、右下暗的 rim light + 內緣柔光 */
.lg::before {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: inherit;
  pointer-events: none;
  z-index: 1;
  box-shadow:
    inset 1.4px 1.4px 0.6px -1px var(--lg-rim-hi),
    inset -1.2px -1.2px 0.6px -1px var(--lg-rim-lo),
    inset 0 0 0 1px var(--lg-stroke-soft),
    inset 0 0 18px rgba(255, 255, 255, 0.08);
}

/* 動態光澤:跟隨指標的柔光(JS 寫入 --lg-px / --lg-py) */
.lg::after {
  content: "";
  position: absolute;
  inset: 0;
  border-radius: inherit;
  pointer-events: none;
  z-index: 1;
  opacity: 0;
  transition: opacity 0.5s var(--lg-ease-out);
  background: radial-gradient(
    140px circle at var(--lg-px, 50%) var(--lg-py, 0%),
    var(--lg-sheen),
    transparent 70%
  );
}
.lg:hover::after { opacity: 0.55; }

/* 玻璃內容須墊在高光層之上 */
.lg > * { position: relative; z-index: 2; }

/* 拖曳中:微放大、加深陰影 */
.lg-dragging {
  cursor: grabbing !important;
  box-shadow:
    0 28px 64px rgba(22, 32, 52, 0.38),
    0 6px 16px rgba(22, 32, 52, 0.18);
  transition: box-shadow 0.2s var(--lg-ease-out);
}

/* ==================================================================== *
 * 3. 發光背景  .lg-glow
 *    任意背景(圖片/顏色)之上,兩層緩慢漂移的光暈
 * ==================================================================== */
.lg-glow {
  position: relative;
  overflow: hidden;
  background: var(--lg-glow-base, #6e84a3);
}
.lg-glow__image {
  position: absolute;
  inset: 0;
  background-image: var(--lg-bg-image);
  background-size: cover;
  background-position: center;
  z-index: 0;
}
.lg-glow::before,
.lg-glow::after {
  content: "";
  position: absolute;
  inset: -30%;
  z-index: 1;
  pointer-events: none;
  mix-blend-mode: soft-light;
}
.lg-glow::before {
  background:
    radial-gradient(42% 36% at 24% 28%, rgba(255, 244, 214, 0.85), transparent 70%),
    radial-gradient(36% 30% at 78% 64%, rgba(190, 215, 255, 0.7), transparent 70%);
  animation: lg-glow-drift-a 26s ease-in-out infinite alternate;
}
.lg-glow::after {
  background:
    radial-gradient(30% 26% at 64% 22%, rgba(255, 226, 200, 0.7), transparent 70%),
    radial-gradient(26% 24% at 30% 76%, rgba(214, 240, 220, 0.6), transparent 70%);
  animation: lg-glow-drift-b 34s ease-in-out infinite alternate;
}
@keyframes lg-glow-drift-a {
  from { transform: translate3d(-3%, -2%, 0) scale(1); }
  to   { transform: translate3d(4%, 3%, 0) scale(1.08); }
}
@keyframes lg-glow-drift-b {
  from { transform: translate3d(3%, 2%, 0) scale(1.05); opacity: 0.9; }
  to   { transform: translate3d(-4%, -3%, 0) scale(1); opacity: 0.65; }
}

/* ==================================================================== *
 * 4. 按鈕  .lg-btn / .lg-btn--pill / .lg-btn--accent / .lg-btn--icon
 * ==================================================================== */
.lg-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 12px 22px;
  border: 0;
  font: 600 15px/1 var(--lg-font);
  letter-spacing: 0.01em;
  color: var(--lg-text);
  cursor: pointer;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  transition:
    transform var(--lg-speed) var(--lg-ease),
    box-shadow var(--lg-speed) var(--lg-ease-out);
}
.lg-btn { scale: var(--lg-sq, 1); }
.lg-btn:hover { transform: translateY(-2px) scale(1.02); }
@media (prefers-reduced-motion: reduce) {
  .lg-btn:active { transform: scale(0.96); }
}
.lg-btn--pill { border-radius: var(--lg-radius-pill); }
.lg-btn--accent {
  background: linear-gradient(140deg, var(--lg-accent), color-mix(in srgb, var(--lg-accent) 78%, #803020));
  color: var(--lg-on-accent);
}
.lg-btn--accent::before {
  box-shadow:
    inset 1.4px 1.4px 0.6px -1px rgba(255, 255, 255, 0.7),
    inset -1.2px -1.2px 0.6px -1px rgba(255, 255, 255, 0.25),
    inset 0 0 0 1px rgba(255, 255, 255, 0.18);
}
.lg-btn--icon {
  width: 46px;
  height: 46px;
  padding: 0;
  border-radius: var(--lg-radius-pill);
}
.lg-btn--lg { padding: 15px 30px; font-size: 16px; }
.lg-btn--sm { padding: 8px 16px; font-size: 13px; }

/* ==================================================================== *
 * 5. 卡片 / 面板  .lg-card
 * ==================================================================== */
.lg-card {
  border-radius: var(--lg-radius-l);
  padding: 22px;
}
.lg-card__title { margin: 0 0 4px; font: 700 17px/1.3 var(--lg-font); }
.lg-card__meta { margin: 0; font: 400 13px/1.5 var(--lg-font); color: var(--lg-text-dim); }

/* ==================================================================== *
 * 6. 導航列  .lg-navbar
 * ==================================================================== */
.lg-navbar {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 10px;
  border-radius: var(--lg-radius-pill);
}
.lg-navbar__brand {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 14px;
  font: 700 15px/1 var(--lg-font);
  white-space: nowrap;
}
.lg-navbar__link {
  border: 0;
  background: transparent;
  padding: 9px 14px;
  border-radius: var(--lg-radius-pill);
  font: 500 14px/1 var(--lg-font);
  color: var(--lg-text-dim);
  cursor: pointer;
  transition: background var(--lg-speed) var(--lg-ease-out), color var(--lg-speed) var(--lg-ease-out);
  text-decoration: none;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.lg-navbar__link:hover,
.lg-navbar__link.is-active {
  background: var(--lg-tint-strong);
  color: var(--lg-text);
}
.lg-navbar__spacer { flex: 1; }

/* ==================================================================== *
 * 7. 搜尋框  .lg-search
 * ==================================================================== */
.lg-search {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 0 16px;
  height: 50px;
  border-radius: var(--lg-radius-pill);
}
.lg-search svg { flex: none; color: var(--lg-text-dim); }
.lg-search input {
  flex: 1;
  min-width: 0;
  border: 0;
  background: transparent;
  outline: none;
  font: 400 15px/1 var(--lg-font);
  color: var(--lg-text);
}
.lg-search input::placeholder { color: var(--lg-text-dim); }
.lg-search kbd {
  font: 500 11px/1 var(--lg-font);
  color: var(--lg-text-dim);
  padding: 4px 7px;
  border-radius: 7px;
  background: var(--lg-tint-strong);
  border: 1px solid var(--lg-stroke-soft);
}

/* ==================================================================== *
 * 7b. 文字輸入  .lg-field(浮動標籤;玻璃只在 __box,label/hint 為實心內容)
 * ==================================================================== */
.lg-field { display: flex; flex-direction: column; gap: 6px; }
.lg-field__box {
  position: relative;
  display: flex;
  align-items: stretch;
  min-height: 58px;
  padding: 0 14px;
  /* 邊框/陰影/圓角沿用 .lg 基底:.lg 已給 border-radius:var(--lg-radius-m)
     + box-shadow:var(--lg-shadow);.lg::before 已給 inset 1px stroke 與 rim。
     此處只加 transition 供 focus/error ring 動畫;hover 回饋由 .lg:hover::after 既有 sheen 負責。 */
  transition: box-shadow var(--lg-speed) var(--lg-ease-out);
}
.lg-field__input {
  flex: 1;
  min-width: 0;
  border: 0;
  background: transparent;
  outline: none;
  font: 400 15px/1.2 var(--lg-font);
  color: var(--lg-text);
  padding: 24px 0 6px;
}
.lg-field__label {
  position: absolute;
  left: 14px;
  top: 0;
  height: 100%;
  display: flex;
  align-items: center;
  font: 400 15px/1 var(--lg-font);
  color: var(--lg-text-dim);
  pointer-events: none;
  transform-origin: left center;
  transition: transform var(--lg-speed) var(--lg-ease-out), color var(--lg-speed) var(--lg-ease-out);
}
.lg-field__input:focus + .lg-field__label,
.lg-field__input:not(:placeholder-shown) + .lg-field__label {
  transform: translateY(-16px) scale(.78);
  color: var(--lg-accent);
}
.lg-field__box:focus-within {
  box-shadow: var(--lg-shadow), 0 0 0 2px var(--lg-accent);
}
.lg-field__clear {
  flex: none;
  align-self: center;
  width: 24px;
  height: 24px;
  margin-left: 8px;
  padding: 0;
  display: grid;
  place-items: center;
  border: 0;
  border-radius: 50%;
  background: transparent;
  color: var(--lg-text-dim);
  cursor: pointer;
  transition: color var(--lg-speed) var(--lg-ease-out), background var(--lg-speed) var(--lg-ease-out);
}
.lg-field__clear svg { width: 15px; height: 15px; fill: currentColor; }
.lg-field__clear:hover { color: var(--lg-text); background: var(--lg-tint); }
.lg-field__input:placeholder-shown ~ .lg-field__clear { display: none; }
.lg-field__hint { font: 400 12.5px/1.3 var(--lg-font); color: var(--lg-text-dim); padding: 0 4px; }
.lg-field--error .lg-field__box,
.lg-field--error .lg-field__box:focus-within {
  box-shadow: var(--lg-shadow), 0 0 0 2px var(--lg-down);
}
.lg-field--error .lg-field__input + .lg-field__label { color: var(--lg-down); }
.lg-field--error .lg-field__hint { color: var(--lg-down); }
.lg-field--disabled .lg-field__box { opacity: .5; }
.lg-field--disabled .lg-field__input { cursor: not-allowed; }
.lg-field__input:read-only { color: var(--lg-text-dim); }

/* Textarea 變體:多行,複用 __box + 浮動標籤;label 貼頂、可垂直 resize、無清除鈕 */
.lg-field--area .lg-field__input {
  resize: vertical;
  min-height: 96px;
  padding: 22px 0 10px;
  line-height: 1.45;
}
/* 隱藏原生方形 resizer 抓柄:它落在圓角玻璃框的圓弧角旁、又被 box 內距往內推,
   位置不協調。仍保留 resize:vertical(底緣可拖、游標仍是 ns-resize) */
.lg-field--area .lg-field__input::-webkit-resizer { display: none; }
.lg-field--area .lg-field__label {
  top: 22px;
  height: auto;
  transform-origin: left top;
}

/* ==================================================================== *
 * 8. 開關  .lg-switch(純 CSS,checkbox)
 * ==================================================================== */
.lg-switch {
  display: inline-flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  font: 500 14px/1 var(--lg-font);
  color: var(--lg-text);
  user-select: none;
}
.lg-switch input { position: absolute; opacity: 0; width: 0; height: 0; }
.lg-switch__track {
  position: relative;
  width: 56px;
  height: 32px;
  border-radius: var(--lg-radius-pill);
  background: var(--lg-tint);
  box-shadow: var(--lg-shadow-soft), inset 0 0 0 1px var(--lg-stroke-soft);
  transition: background var(--lg-speed) var(--lg-ease-out);
  flex: none;
}
html.lg-fallback .lg-switch__track,
.lg-switch__track {
  -webkit-backdrop-filter: blur(14px) saturate(1.6);
  backdrop-filter: blur(14px) saturate(1.6);
}
.lg-switch__thumb {
  position: absolute;
  top: 3px;
  left: 3px;
  width: 26px;
  height: 26px;
  border-radius: 50%;
  background: linear-gradient(150deg, rgba(255, 255, 255, 0.98), rgba(235, 240, 248, 0.92));
  box-shadow:
    0 2px 6px rgba(22, 32, 52, 0.3),
    inset 1px 1px 0.5px -0.5px rgba(255, 255, 255, 1);
  transform: translateX(var(--lg-tx, 0px));
  scale: var(--lg-thx, 1) var(--lg-thy, 1);
  transition: transform var(--lg-speed) var(--lg-ease), width var(--lg-speed) var(--lg-ease);
}
.lg-switch input:checked + .lg-switch__track { background: var(--lg-accent); }
.lg-switch input:checked + .lg-switch__track .lg-switch__thumb { --lg-tx: 24px; }
.lg-switch:active .lg-switch__thumb { width: 32px; } /* 液態拉伸 */
.lg-switch input:checked + .lg-switch__track:active .lg-switch__thumb,
.lg-switch:active input:checked + .lg-switch__track .lg-switch__thumb { --lg-tx: 18px; }
.lg-switch input:focus-visible + .lg-switch__track {
  outline: 2px solid var(--lg-accent);
  outline-offset: 3px;
}

/* ==================================================================== *
 * 8b. 核取方塊  .lg-check(純 CSS,checkbox;box 磨砂,勾為實心內容)
 * ==================================================================== */
.lg-check {
  display: inline-flex;
  align-items: center;
  gap: 11px;
  cursor: pointer;
  font: 500 14px/1 var(--lg-font);
  color: var(--lg-text);
  user-select: none;
}
.lg-check input { position: absolute; opacity: 0; width: 0; height: 0; }
.lg-check__box {
  position: relative;
  width: 22px;
  height: 22px;
  flex: none;
  border-radius: var(--lg-radius-s);
  background: var(--lg-tint);
  box-shadow: var(--lg-shadow-soft), inset 0 0 0 1px var(--lg-stroke-soft);
  transition: background var(--lg-speed) var(--lg-ease-out),
              box-shadow var(--lg-speed) var(--lg-ease-out),
              scale var(--lg-speed) var(--lg-ease);
}
html.lg-fallback .lg-check__box,
.lg-check__box {
  -webkit-backdrop-filter: blur(14px) saturate(1.6);
  backdrop-filter: blur(14px) saturate(1.6);
}
.lg-check__mark {
  position: absolute;
  inset: 3px;
  width: calc(100% - 6px);
  height: calc(100% - 6px);
  color: #fff;
  fill: currentColor;
  scale: 0;
  transition: scale var(--lg-speed) cubic-bezier(.34, 1.56, .64, 1);
}
.lg-check:hover .lg-check__box {
  box-shadow: var(--lg-shadow-soft), inset 0 0 0 1px var(--lg-stroke);
  scale: 1.04;
}
.lg-check:active .lg-check__box { scale: 0.92; }
.lg-check input:checked + .lg-check__box,
.lg-check input:indeterminate + .lg-check__box {
  background: var(--lg-accent);
  box-shadow: var(--lg-shadow-soft), inset 0 0 0 1px transparent;
}
.lg-check input:checked + .lg-check__box .lg-check__mark { scale: 1; }
.lg-check input:indeterminate + .lg-check__box .lg-check__mark { scale: 0; }
.lg-check input:indeterminate + .lg-check__box::after {
  content: "";
  position: absolute;
  left: 5px;
  right: 5px;
  top: 50%;
  height: 2px;
  border-radius: 1px;
  background: #fff;
  transform: translateY(-50%);
}
.lg-check input:focus-visible + .lg-check__box {
  outline: 2px solid var(--lg-accent);
  outline-offset: 3px;
}
.lg-check input:disabled ~ .lg-check__box,
.lg-check input:disabled ~ .lg-check__label { opacity: 0.45; }

/* ==================================================================== *
 * 8c. 單選  .lg-radio(純 CSS,radio;圓 box + 中心圓點,點為實心內容)
 * ==================================================================== */
.lg-radio-group { display: flex; flex-direction: column; gap: 12px; }
.lg-radio {
  display: inline-flex;
  align-items: center;
  gap: 11px;
  cursor: pointer;
  font: 500 14px/1 var(--lg-font);
  color: var(--lg-text);
  user-select: none;
}
.lg-radio input { position: absolute; opacity: 0; width: 0; height: 0; }
.lg-radio__box {
  position: relative;
  width: 22px;
  height: 22px;
  flex: none;
  border-radius: 50%;
  background: var(--lg-tint);
  box-shadow: var(--lg-shadow-soft), inset 0 0 0 1px var(--lg-stroke-soft);
  transition: background var(--lg-speed) var(--lg-ease-out),
              box-shadow var(--lg-speed) var(--lg-ease-out),
              scale var(--lg-speed) var(--lg-ease);
}
html.lg-fallback .lg-radio__box,
.lg-radio__box {
  -webkit-backdrop-filter: blur(14px) saturate(1.6);
  backdrop-filter: blur(14px) saturate(1.6);
}
.lg-radio__box::after {
  content: "";
  position: absolute;
  inset: 0;
  margin: auto;
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #fff;
  scale: 0;
  transition: scale var(--lg-speed) cubic-bezier(.34, 1.56, .64, 1);
}
.lg-radio:hover .lg-radio__box {
  box-shadow: var(--lg-shadow-soft), inset 0 0 0 1px var(--lg-stroke);
  scale: 1.04;
}
.lg-radio:active .lg-radio__box { scale: 0.92; }
.lg-radio input:checked + .lg-radio__box {
  background: var(--lg-accent);
  box-shadow: var(--lg-shadow-soft), inset 0 0 0 1px transparent;
}
.lg-radio input:checked + .lg-radio__box::after { scale: 1; }
.lg-radio input:focus-visible + .lg-radio__box {
  outline: 2px solid var(--lg-accent);
  outline-offset: 3px;
}
.lg-radio input:disabled ~ .lg-radio__box,
.lg-radio input:disabled ~ .lg-radio__label { opacity: 0.45; }

/* ==================================================================== *
 * 8d. 步進器  .lg-stepper(玻璃容器 + native number + −/+ 鈕)
 * ==================================================================== */
.lg-stepper {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 5px;
  border-radius: var(--lg-radius-pill);
  transition: box-shadow var(--lg-speed) var(--lg-ease-out);
}
.lg-stepper__btn {
  flex: none;
  width: 34px;
  height: 34px;
  display: grid;
  place-items: center;
  border: 0;
  border-radius: 50%;
  background: transparent;
  color: var(--lg-text-dim);
  cursor: pointer;
  transition: scale var(--lg-speed) var(--lg-ease),
              background var(--lg-speed) var(--lg-ease-out),
              color var(--lg-speed) var(--lg-ease-out);
}
.lg-stepper__btn svg { width: 18px; height: 18px; fill: currentColor; }
.lg-stepper__btn:hover { background: var(--lg-tint); color: var(--lg-text); }
.lg-stepper__btn:active { scale: 0.9; }
.lg-stepper__input {
  width: 44px;
  flex: none;
  border: 0;
  background: transparent;
  outline: none;
  text-align: center;
  font: 600 15px/1 var(--lg-font);
  color: var(--lg-text);
  -moz-appearance: textfield;
  appearance: textfield;
}
.lg-stepper__input::-webkit-outer-spin-button,
.lg-stepper__input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
.lg-stepper:focus-within {
  box-shadow: var(--lg-shadow), 0 0 0 2px var(--lg-accent);
}
.lg-stepper--disabled { opacity: 0.5; }

/* ==================================================================== *
 * 8e. 星等評分  .lg-rating(純 CSS,radio;reverse DOM + ~ 選擇器,星非玻璃)
 * ==================================================================== */
.lg-rating {
  display: inline-flex;
  flex-direction: row-reverse;
  gap: 2px;
}
.lg-rating input { position: absolute; opacity: 0; width: 0; height: 0; }
.lg-rating__star {
  display: inline-flex;
  cursor: pointer;
  color: var(--lg-text-dim);
  transition: color var(--lg-speed) var(--lg-ease-out),
              scale var(--lg-speed) var(--lg-ease);
}
.lg-rating__star svg { width: 28px; height: 28px; fill: currentColor; }
/* 2. 已選及更低星 → accent */
.lg-rating input:checked ~ label { color: var(--lg-accent); }
/* 3. 容器 hover 時全部重置 dim(特異度同規則 2、置於其後 → 勝出) */
.lg-rating:hover input ~ label { color: var(--lg-text-dim); }
/* 4. hover 預覽:hovered + 更低星 → accent(特異度高於規則 3 → 勝出);hovered 彈一下 */
.lg-rating:hover label:hover,
.lg-rating:hover label:hover ~ label { color: var(--lg-accent); }
.lg-rating:hover label:hover { scale: 1.12; }
/* focus / disabled */
.lg-rating input:focus-visible + label { outline: 2px solid var(--lg-accent); outline-offset: 2px; }
.lg-rating--disabled { opacity: 0.5; pointer-events: none; }

/* ==================================================================== *
 * 8f. 驗證碼  .lg-otp(N 個 bespoke 磨砂 input;initOtp 自動進格)
 * ==================================================================== */
.lg-otp { display: inline-flex; gap: 8px; }
.lg-otp__cell {
  width: 44px;
  height: 52px;
  flex: none;
  border: 0;
  border-radius: var(--lg-radius-s);
  background: var(--lg-tint);
  box-shadow: var(--lg-shadow-soft), inset 0 0 0 1px var(--lg-stroke-soft);
  text-align: center;
  font: 600 21px/1 var(--lg-font);
  color: var(--lg-text);
  outline: none;
  transition: box-shadow var(--lg-speed) var(--lg-ease-out);
}
html.lg-fallback .lg-otp__cell,
.lg-otp__cell {
  -webkit-backdrop-filter: blur(14px) saturate(1.6);
  backdrop-filter: blur(14px) saturate(1.6);
}
.lg-otp__cell:focus {
  box-shadow: var(--lg-shadow-soft), inset 0 0 0 1px var(--lg-stroke-soft), 0 0 0 2px var(--lg-accent);
}
.lg-otp__cell:disabled { opacity: 0.5; cursor: not-allowed; }

/* ==================================================================== *
 * 8g. 檔案上傳  .lg-upload(折射玻璃拖放區 + DataTransfer 清單)
 * ==================================================================== */
.lg-upload {
  display: block;
  border-radius: var(--lg-radius-l);
  padding: 28px 24px;
  text-align: center;
  cursor: pointer;
  transition: box-shadow var(--lg-speed) var(--lg-ease-out);
}
.lg-upload__input { position: absolute; opacity: 0; width: 1px; height: 1px; }
.lg-upload__prompt { display: flex; flex-direction: column; align-items: center; gap: 6px; pointer-events: none; }
.lg-upload__icon { width: 40px; height: 40px; fill: currentColor; color: var(--lg-text-dim); }
.lg-upload__title { margin: 0; font: 500 14px/1.4 var(--lg-font); color: var(--lg-text); }
.lg-upload__title strong { color: var(--lg-accent); font-weight: 600; }
.lg-upload__hint { margin: 0; font: 400 12px/1 var(--lg-font); color: var(--lg-text-dim); }
.lg-upload:focus-within,
.lg-upload.is-dragover { box-shadow: var(--lg-shadow), 0 0 0 2px var(--lg-accent); }
.lg-upload.is-dragover .lg-upload__icon { color: var(--lg-accent); }
.lg-upload__list { list-style: none; margin: 14px 0 0; padding: 0; display: flex; flex-direction: column; gap: 8px; }
.lg-upload__list:empty { display: none; }
.lg-upload__file {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px; border-radius: var(--lg-radius-s);
  background: var(--lg-tint); text-align: left;
}
.lg-upload__fileicon { width: 18px; height: 18px; flex: none; fill: currentColor; color: var(--lg-text-dim); }
.lg-upload__name { flex: 1; min-width: 0; font: 500 13px/1.2 var(--lg-font); color: var(--lg-text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.lg-upload__size { flex: none; font: 400 12px/1 var(--lg-font); color: var(--lg-text-dim); }
.lg-upload__remove {
  flex: none; width: 24px; height: 24px; display: grid; place-items: center;
  border: 0; border-radius: 50%; background: transparent; color: var(--lg-text-dim); cursor: pointer;
  transition: color var(--lg-speed) var(--lg-ease-out), background var(--lg-speed) var(--lg-ease-out);
}
.lg-upload__remove svg { width: 14px; height: 14px; fill: currentColor; }
.lg-upload__remove:hover { background: var(--lg-tint); color: var(--lg-text); }
.lg-upload--disabled { opacity: 0.5; pointer-events: none; }

/* ==================================================================== *
 * 9. 滑桿  .lg-slider(range)
 * ==================================================================== */
.lg-slider {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 0 18px;
  height: 52px;
  border-radius: var(--lg-radius-pill);
}
.lg-slider svg { flex: none; color: var(--lg-text-dim); }
.lg-slider__input {
  flex: 1;
  -webkit-appearance: none;
  appearance: none;
  height: 8px;
  border-radius: 4px;
  outline: none;
  background:
    linear-gradient(var(--lg-accent), var(--lg-accent)) 0 / var(--lg-fill, 50%) 100% no-repeat,
    var(--lg-tint-strong);
  box-shadow: inset 0 0 0 1px var(--lg-stroke-soft);
  cursor: pointer;
}
.lg-slider__input::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 24px;
  height: 24px;
  border-radius: 50%;
  border: 0;
  background: linear-gradient(150deg, rgba(255, 255, 255, 0.98), rgba(235, 240, 248, 0.92));
  box-shadow:
    0 2px 7px rgba(22, 32, 52, 0.32),
    inset 1px 1px 0.5px -0.5px rgba(255, 255, 255, 1);
  transition: transform 0.18s var(--lg-ease);
}
.lg-slider__input::-moz-range-thumb {
  width: 24px;
  height: 24px;
  border-radius: 50%;
  border: 0;
  background: #fff;
  box-shadow: 0 2px 7px rgba(22, 32, 52, 0.32);
}
.lg-slider__input:active::-webkit-slider-thumb { transform: scale(1.25); }
.lg-slider__input:focus-visible {
  outline: 2px solid var(--lg-accent);
  outline-offset: 3px;
}

/* ==================================================================== *
 * 10. 分頁  .lg-tabs(segmented control,滑動玻璃指示器)
 * ==================================================================== */
.lg-tabs {
  position: relative;
  display: inline-flex;
  padding: 5px;
  border-radius: var(--lg-radius-pill);
  gap: 2px;
}
.lg-tabs__pill {
  position: absolute;
  top: 5px;
  bottom: 5px;
  left: 0;
  width: 0;
  border-radius: var(--lg-radius-pill);
  background: var(--lg-tint-strong);
  box-shadow:
    0 2px 8px rgba(22, 32, 52, 0.16),
    inset 1px 1px 0.5px -0.5px var(--lg-rim-hi);
  transition: left var(--lg-speed) var(--lg-ease), width var(--lg-speed) var(--lg-ease);
  z-index: 1;
  transform-origin: center;
}
.lg-tabs__tab {
  position: relative;
  z-index: 2;
  border: 0;
  background: transparent;
  padding: 9px 18px;
  border-radius: var(--lg-radius-pill);
  font: 600 14px/1 var(--lg-font);
  color: var(--lg-text-dim);
  cursor: pointer;
  scale: var(--lg-sq, 1);
  transition: color var(--lg-speed) var(--lg-ease-out);
  display: inline-flex;
  align-items: center;
  gap: 7px;
}
.lg-tabs__tab.is-active { color: var(--lg-text); }

/* ==================================================================== *
 * 11. 對話框  .lg-modal
 *     維持版面尺寸(僅隱形),確保折射貼圖在開啟前已正確生成
 * ==================================================================== */
.lg-modal {
  position: fixed;
  inset: 0;
  z-index: 60;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
  visibility: hidden;
  pointer-events: none;
}
.lg-modal__overlay {
  position: absolute;
  inset: 0;
  background: rgba(16, 22, 36, 0.34);
  opacity: 0;
  transition: opacity 0.3s var(--lg-ease-out);
}
.lg-modal__panel {
  position: relative;
  width: min(420px, 100%);
  border-radius: var(--lg-radius-l);
  padding: 26px;
  opacity: 0;
  transform: scale(0.86) translateY(18px);
  transition:
    transform 0.38s var(--lg-ease),
    opacity 0.25s var(--lg-ease-out);
}
.lg-modal.is-open { visibility: visible; pointer-events: auto; }
.lg-modal.is-open .lg-modal__overlay { opacity: 1; }
.lg-modal.is-open .lg-modal__panel {
  opacity: 1;
  transform: none;
  animation: lg-droplet 0.6s cubic-bezier(0.22, 1, 0.36, 1);
}
@keyframes lg-droplet {
  0%   { opacity: 0; transform: scale(0.62) translateY(46px); }
  45%  { opacity: 1; transform: scale(1.05) translateY(-6px); }
  70%  { transform: scale(0.975) translateY(2px); }
  100% { transform: none; }
}
@media (prefers-reduced-motion: reduce) {
  .lg-modal.is-open .lg-modal__panel { animation: none; }
}
.lg-modal__panel.is-morphing { animation: none !important; }

/* ==================================================================== *
 * 12. 工具提示  .lg-tooltip(JS 建立的單例)
 * ==================================================================== */
.lg-tooltip {
  position: fixed;
  z-index: 80;
  max-width: 240px;
  padding: 9px 13px;
  border-radius: var(--lg-radius-xs);
  font: 500 13px/1.45 var(--lg-font);
  color: var(--lg-text);
  background: var(--lg-tint-strong);
  -webkit-backdrop-filter: blur(18px) saturate(1.6);
  backdrop-filter: blur(18px) saturate(1.6);
  box-shadow:
    var(--lg-shadow-soft),
    inset 1px 1px 0.5px -0.5px var(--lg-rim-hi),
    inset 0 0 0 1px var(--lg-stroke-soft);
  opacity: 0;
  transform: translateY(4px) scale(0.96);
  transition: opacity 0.2s var(--lg-ease-out), transform 0.25s var(--lg-ease);
  pointer-events: none;
}
.lg-tooltip.is-visible { opacity: 1; transform: none; }

/* ==================================================================== *
 * 13. Dock  .lg-dock(鄰近放大由 JS 驅動)
 * ==================================================================== */
.lg-dock {
  display: inline-flex;
  align-items: flex-end;
  gap: 10px;
  padding: 12px 16px;
  border-radius: var(--lg-radius-l);
}
.lg-dock__item {
  width: 48px;
  height: 48px;
  border: 0;
  border-radius: var(--lg-radius-xs);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: var(--lg-text);
  background: var(--lg-tint-strong);
  box-shadow:
    inset 1px 1px 0.5px -0.5px var(--lg-rim-hi),
    inset 0 0 0 1px var(--lg-stroke-soft),
    0 2px 6px rgba(22, 32, 52, 0.14);
  transform-origin: bottom center;
  scale: var(--lg-sq, 1);
  transition: transform 0.2s var(--lg-ease-out);
}
@media (prefers-reduced-motion: reduce) {
  .lg-dock__item:hover { transform: scale(1.12); }
}

/* ==================================================================== *
 * 14. 小元件:chip / badge
 * ==================================================================== */
.lg-chip {
  scale: var(--lg-sq, 1);
  display: inline-flex;
  align-items: center;
  gap: 7px;
  padding: 7px 14px;
  border-radius: var(--lg-radius-pill);
  border: 0;
  font: 500 13px/1 var(--lg-font);
  color: var(--lg-text);
  background: var(--lg-tint-strong);
  -webkit-backdrop-filter: blur(14px) saturate(1.5);
  backdrop-filter: blur(14px) saturate(1.5);
  box-shadow:
    inset 1px 1px 0.5px -0.5px var(--lg-rim-hi),
    inset 0 0 0 1px var(--lg-stroke-soft);
  cursor: default;
}
.lg-badge {
  display: inline-flex;
  min-width: 20px;
  height: 20px;
  padding: 0 6px;
  align-items: center;
  justify-content: center;
  border-radius: var(--lg-radius-pill);
  background: var(--lg-accent);
  color: var(--lg-on-accent);
  font: 700 11px/1 var(--lg-font);
}

/* ==================================================================== *
 * 15. 儀表板元件 (v0.1)
 *     .lg-stat / .lg-meter / .lg-gauge / .lg-chart / .lg-toast
 *     原則:玻璃只做容器;數字、sparkline、圖表是實心內容層
 * ==================================================================== */

/* ---- Stat:KPI 卡(數字滾動 + delta 徽章 + sparkline) ---- */
.lg-stat {
  display: flex;
  flex-direction: column;
  gap: 8px;
  min-width: 168px;
  padding: 16px 18px 13px;
  border-radius: var(--lg-radius-m);
}
.lg-stat__label {
  display: flex;
  align-items: center;
  gap: 6px;
  font: 600 11.5px/1.2 var(--lg-font);
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: var(--lg-text-dim);
}
.lg-stat__label svg { width: 14px; height: 14px; fill: currentColor; flex: none; }
.lg-stat__row {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
.lg-stat__value {
  font: 700 29px/1 var(--lg-font);
  letter-spacing: -0.01em;
  color: var(--lg-text);
  font-variant-numeric: tabular-nums;
}
.lg-stat__delta {
  display: inline-flex;
  align-items: center;
  gap: 3px;
  padding: 3.5px 8px;
  border-radius: var(--lg-radius-pill);
  font: 700 12px/1 var(--lg-font);
  font-variant-numeric: tabular-nums;
  background: var(--lg-up-soft);
  color: var(--lg-up);
}
.lg-stat__delta svg { width: 12px; height: 12px; fill: currentColor; }
.lg-stat__delta--down { background: var(--lg-down-soft); color: var(--lg-down); }
.lg-stat__spark {
  display: block;
  width: 100%;
  height: 38px;
  margin-top: 2px;
  color: var(--lg-accent);   /* sparkline 顏色,單卡可覆寫 */
  overflow: visible;
}

/* ---- Meter:液體進度條(凹槽軌道 + 實心液體 + 彎月面鼓頭) ---- */
.lg-meter {
  position: relative;
  width: 100%;
  height: 16px;
  border-radius: var(--lg-radius-pill);
  background: var(--lg-tint);
  box-shadow:
    inset 0 1.5px 3px rgba(22, 32, 52, 0.16),
    inset 0 0 0 1px var(--lg-stroke-soft);
}
.lg-meter__fill {
  position: absolute;
  top: 2px; bottom: 2px; left: 2px;
  width: 0%;
  min-width: 12px;
  max-width: calc(100% - 4px);
  border-radius: var(--lg-radius-pill);
  background: var(--lg-accent);
}
.lg-meter__fill::before {   /* 液面高光 */
  content: "";
  position: absolute;
  inset: 0;
  border-radius: inherit;
  background: linear-gradient(180deg, rgba(255, 255, 255, 0.45), rgba(255, 255, 255, 0) 58%);
}
.lg-meter__head {            /* 前緣彎月面:彈簧速度驅動拉伸(JS 寫 transform) */
  position: absolute;
  top: 50%; right: -3px;
  width: 18px; height: 18px;
  margin-top: -9px;
  border-radius: 50%;
  background: var(--lg-accent);
  box-shadow:
    inset 1.5px 2px 1px -1px rgba(255, 255, 255, 0.8),
    0 1px 5px rgba(22, 32, 52, 0.28);
}

/* ---- Gauge:環形儀表(玻璃圓 + SVG 弧,結構由 JS 注入) ---- */
.lg-gauge {
  position: relative;
  width: 132px;
  height: 132px;
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  flex: none;
}
.lg-gauge__svg {
  position: absolute;
  inset: 7px;
  width: calc(100% - 14px);
  height: calc(100% - 14px);
  transform: rotate(-90deg);   /* 弧從 12 點鐘開始 */
}
.lg-gauge__track { fill: none; stroke: var(--lg-stroke-soft); stroke-width: 9; }
.lg-gauge__arc {
  fill: none;
  stroke: var(--lg-accent);
  stroke-width: 9;
  stroke-linecap: round;
}
.lg-gauge__center { position: relative; text-align: center; }
.lg-gauge__value {
  font: 700 26px/1 var(--lg-font);
  color: var(--lg-text);
  font-variant-numeric: tabular-nums;
}
.lg-gauge__unit {
  font: 600 13px/1 var(--lg-font);
  color: var(--lg-text-dim);
  margin-left: 1px;
}
.lg-gauge__label {
  display: block;
  margin-top: 5px;
  font: 600 10px/1.2 var(--lg-font);
  letter-spacing: 0.07em;
  text-transform: uppercase;
  color: var(--lg-text-dim);
}

/* ---- Chart:玻璃容器 + 手刻 SVG 折線/長條 ---- */
.lg-chart {
  position: relative;
  display: flex;
  flex-direction: column;
  gap: 6px;
  min-width: 0;
  padding: 16px 18px 12px;
  border-radius: var(--lg-radius-m);
}
.lg-chart__head { display: flex; align-items: baseline; gap: 10px; }
.lg-chart__title { margin: 0; font: 650 14.5px/1.2 var(--lg-font); color: var(--lg-text); }
.lg-chart__meta { font: 500 11.5px/1 var(--lg-font); color: var(--lg-text-dim); }
.lg-chart__svg {
  display: block;
  flex: 1;
  width: 100%;
  min-height: 120px;
  color: var(--lg-accent);   /* 線與漸層面繼承 */
  touch-action: pan-y;
}
.lg-chart__grid { stroke: var(--lg-stroke-soft); stroke-width: 1; }
.lg-chart__axis { font: 500 10px var(--lg-font); fill: var(--lg-text-dim); }
.lg-chart__line {
  fill: none;
  stroke: currentColor;
  stroke-width: 2.5;
  stroke-linecap: round;
  stroke-linejoin: round;
}
.lg-chart__dot { fill: currentColor; stroke: rgba(255, 255, 255, 0.92); stroke-width: 1.5; }
[data-lg-theme="dark"] .lg-chart__dot { stroke: rgba(18, 24, 38, 0.9); }
.lg-chart__bar { fill: currentColor; opacity: 0.85; }
.lg-chart__cross {
  stroke: var(--lg-text-dim);
  stroke-width: 1;
  stroke-dasharray: 3 4;
  opacity: 0;
  transition: opacity 0.15s var(--lg-ease-out);
  pointer-events: none;
}
.lg-chart__tip {              /* 實心數值提示(內容層,深色膠囊) */
  position: absolute;
  z-index: 5;
  padding: 6px 10px;
  border-radius: 10px;
  background: rgba(22, 30, 48, 0.9);
  color: #f4f7fc;
  font: 600 12px/1.3 var(--lg-font);
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
  pointer-events: none;

   *      data-lg-points 即觸發彈簧動畫——單一 MutationObserver 監聽全

  // Catmull-Rom → 三次貝茲,折線變平滑曲線
  function smoothPath(p) {

    }
    var d = 'M' + p[0][0].toFixed(2) + ' ' + p[0][1].toFixed(2);
    for (var i = 0; i < p.length - 1; i++) {

         + ' ' + (p2[0] - (p3[0] - p1[0]) / 6).toFixed(2) + ' ' + (p2[1] - (p3[1] - p1[1]) / 6).toFixed(2)

    }

  /* ---- Stat:數字滾動 ---- */
  function initStatValue(span) {

    var prefix = span.getAttribute('data-lg-prefix') || '';
    var suffix = span.getAttribute('data-lg-suffix') || '';
    function target() { return parseFloat(span.getAttribute('data-lg-value')) || 0; }
    function decimals() {
      var a = span.getAttribute('data-lg-decimals');
      if (a !== null) return Math.max(0, Math.min(4, +a || 0));
      var raw = span.getAttribute('data-lg-value') || '';

    var sp = new Spring(0, { stiffness: 120, damping: 22, onUpdate: write });
    statRegistry.set(span, {
      update: function () { REDUCED_MOTION ? sp.snap(target()) : sp.set(target()); }
    });

  /* ---- Stat:sparkline(實心內容層,顏色繼承 currentColor) ---- */
  function renderSpark(svg) {
    var raw = (svg.getAttribute('data-lg-spark') || '').split(',').map(parseFloat).filter(isFinite);
    if (raw.length < 2) return;

    });

    var grad = svgNode('linearGradient', { id: gid, x1: 0, y1: 0, x2: 0, y2: 1 }, svgNode('defs', {}, svg));
    svgNode('stop', { offset: '0%', 'stop-color': 'currentColor', 'stop-opacity': 0.26 }, grad);
    svgNode('stop', { offset: '100%', 'stop-color': 'currentColor', 'stop-opacity': 0 }, grad);
    var d = smoothPath(pts);
    svgNode('path', {
      d: d + 'L' + pts[pts.length - 1][0].toFixed(2) + ' ' + H + 'L' + pts[0][0].toFixed(2) + ' ' + H + 'Z',

  /* ---- Meter:液體進度。前緣彎月面鼓頭隨彈簧速度拉伸 ---- */

  /* ---- Gauge:環形儀表(SVG 弧 + 中心數值;結構由 JS 注入) ---- */

  /* ---- Chart:手刻 SVG 折線/長條(零依賴),hover 十字線 + 數值提示 ---- */
  function initChart(svg) {
    if (!statRegistry || statRegistry.get(svg)) return;
    var panel = (svg.closest && svg.closest('.lg-chart')) || svg.parentNode;
    var tip = panel.querySelector('.lg-chart__tip');
    if (!tip) {
      tip = document.createElement('div'); tip.className = 'lg-chart__tip';
      panel.appendChild(tip);
    }
    var state = { pts: [], data: [], labels: [], plotX0: 0, plotX1: 0, drawn: REDUCED_MOTION };

    function render() {
      var type = svg.getAttribute('data-lg-chart') || 'line';
      var data = (svg.getAttribute('data-lg-points') || '').split(',').map(parseFloat).filter(isFinite);
      var labels = (svg.getAttribute('data-lg-labels') || '').split(',').map(function (s) { return s.trim(); });
      var rect = svg.getBoundingClientRect();
      if (data.length < 2 || rect.width < 40 || rect.height < 40) return;   // 視圖隱藏時跳過,RO 顯示後補繪
      var W = Math.round(rect.width), H = Math.round(rect.height);
      var PL = 8, PR = 8, PT = 10, PB = labels[0] ? 20 : 8;
      svg.setAttribute('viewBox', '0 0 ' + W + ' ' + H);
      while (svg.firstChild) svg.removeChild(svg.firstChild);

        : function (i) { return PL + (W - PL - PR) * (data.length === 1 ? 0.5 : i / (data.length - 1)); };
      var py = function (v) { return PT + (H - PT - PB) * (1 - (v - min) / (max - min)); };

      for (var g = 1; g <= 3; g++) {
        var gy = PT + (H - PT - PB) * g / 4;
        svgNode('line', { 'class': 'lg-chart__grid', x1: PL, x2: W - PR, y1: gy.toFixed(1), y2: gy.toFixed(1) }, svg);
      }

      var pts = data.map(function (v, i) { return [px(i), py(v)]; });
      state.pts = pts; state.data = data; state.labels = labels;
      state.plotX0 = PL; state.plotX1 = W - PR;

      if (type === 'bar') {

        data.forEach(function (v, i) {

          svgNode('rect', {
            'class': 'lg-chart__bar', x: (px(i) - bw / 2).toFixed(1), width: bw.toFixed(1),
            y: Math.min(y, y0).toFixed(1), height: Math.max(2, Math.abs(y0 - y)).toFixed(1), rx: Math.min(5, bw / 2)
          }, svg);

        var grad = svgNode('linearGradient', { id: gid, x1: 0, y1: 0, x2: 0, y2: 1 }, svgNode('defs', {}, svg));
        svgNode('stop', { offset: '0%', 'stop-color': 'currentColor', 'stop-opacity': 0.22 }, grad);
        svgNode('stop', { offset: '100%', 'stop-color': 'currentColor', 'stop-opacity': 0 }, grad);
        svgNode('path', {
          'class': 'lg-chart__area',
          d: d + 'L' + pts[pts.length - 1][0].toFixed(2) + ' ' + (H - PB) + 'L' + pts[0][0].toFixed(2) + ' ' + (H - PB) + 'Z',
          fill: 'url(#' + gid + ')'
        }, svg);
        var line = svgNode('path', { 'class': 'lg-chart__line', d: d }, svg);
        pts.forEach(function (p) {
          svgNode('circle', { 'class': 'lg-chart__dot', cx: p[0].toFixed(2), cy: p[1].toFixed(2), r: 3 }, svg);
        });
        if (!state.drawn) {           // 首繪:線條描入(REDUCED_MOTION 略過)
          state.drawn = true;

          }, svg).textContent = t;

      state.cross.setAttribute('x1', p[0]); state.cross.setAttribute('x2', p[0]);
      state.cross.style.opacity = '1';
      var pr = panel.getBoundingClientRect();
      tip.textContent = (state.labels[best] ? state.labels[best] + ' · ' : '') + fmtNumber(state.data[best], state.data[best] % 1 ? 1 : 0);
      tip.style.left = (r.left - pr.left + p[0]) + 'px';

  var box = $('#toast'), el = document.createElement('div');
  el.className = 'tst'; el.textContent = msg;
  box.appendChild(el);
  while (box.children.length > 3) box.removeChild(box.firstChild);
  setTimeout(function () { if (el.parentNode) el.parentNode.removeChild(el); }, 4200);
}

/* {{stop:..}} / {{add:..}} → 強調 span（對照 spec §4 parseConclusion） */
function parseConclusion(s) {
  return s
    .replace(/\{\{stop:([^}]*)\}\}/g, '<em>$1</em>')
    .replace(/\{\{add:([^}]*)\}\}/g, '<u>$1</u>');
}

var WXCLS = { '無': 'ok', '小雨': 'ok', '大雨': 'warn', '豪雨': 'stop', '大豪雨': 'stop', '超大豪雨': 'stop' };
var SYM = { stop: '✕ ', warn: '! ', ok: '' };

/* ── 渲染 ── */
function renderHero(sc) {
  var n = sc.nowcast;
  var wx = $('#wx');
  wx.className = 'wx ' + WXCLS[n.rainLevel] + ' anim';
  $('#wxlvl').textContent = n.rainLevel === '無' ? '無降雨' : n.rainLevel;
  $('#wxbf').textContent = n.beaufort + ' 級';
  $('#wxavg').textContent = n.windAvg.toFixed(1);
  $('#wxgust').textContent = n.windGust.toFixed(1);
  $('#wxmet').textContent = 'CSI ' + sc.metrics.csi.toFixed(2) + ' · POD ' + sc.metrics.pod.toFixed(2) + ' · FAR ' + sc.metrics.far.toFixed(2);
  $('#concl').innerHTML = parseConclusion(sc.conclusion);
}

function renderMatrix(sc) {
  var html = sc.ops.map(function (op) {
    return '<div class="mrow" data-op="' + op.id + '" tabindex="0" role="button" aria-expanded="false">' +
      '<span class="chev">▶</span><span class="nm">' + op.name + '</span>' +
      '<span class="mseg now st-' + op.now.status + '">' + SYM[op.now.status] + op.now.action + '</span>' +
      '<span class="mseg cwa st-' + op.cwa3 + '"></span>' +
      '<span class="mseg cwa st-' + op.cwa6 + '"></span></div>';
  }).join('');
  $('#mxbody').innerHTML = html;
  openOp = null;
}

function renderCards(sc) {
  $('#cardn').textContent = String(sc.cards.length);
  $('#cards').innerHTML = sc.cards.map(function (c, i) {
    var b = c.badge ? '<span class="dbadge ' + (c.badge.urgent ? 'u' : 'n') + '">' + c.badge.text + '</span>' : '';
    return '<div class="dcard lg lg-static ' + c.level + ' anim" style="--d:' + (0.05 * i).toFixed(2) + 's;margin-bottom:9px">' +
      '<b>' + c.title + b + '</b><p>' + c.body + '</p></div>';
  }).join('');
}

function renderAll() {
  var sc = SCN[cur];
  renderHero(sc); renderMatrix(sc); renderCards(sc); updateBubble();
}

/* ── 規則展開（單列互斥） ── */
$('#mxbody').addEventListener('click', function (e) {
  var row = e.target.closest('.mrow');
  if (!row) return;
  toggleRow(row);
});
$('#mxbody').addEventListener('keydown', function (e) {
  var row = e.target.closest('.mrow');
  if (row && (e.key === 'Enter' || e.key === ' ')) { e.preventDefault(); toggleRow(row); }
});
function toggleRow(row) {
  var id = row.getAttribute('data-op');
  var prev = $('#mxbody .mexp');
  if (prev) prev.remove();
  var prevRow = $('#mxbody .mrow.open');
  if (prevRow) { prevRow.classList.remove('open'); prevRow.setAttribute('aria-expanded', 'false'); }
  if (openOp === id) { openOp = null; return; }
  openOp = id;
  row.classList.add('open'); row.setAttribute('aria-expanded', 'true');
  var op = SCN[cur].ops.find(function (o) { return o.id === id; });
  var exp = document.createElement('div');
  exp.className = 'mexp';
  exp.innerHTML = op.rules.map(function (r, i) {
    return i === 0
      ? '<div>' + r.text + '</div><div class="r"><span class="tag ' + (r.tag === 'official' ? 'o' : 'i') + '">' + (r.tag === 'official' ? '官方' : '慣例') + '</span>' + r.basis + '</div>'
      : '<div class="r"><span class="tag ' + (r.tag === 'official' ? 'o' : 'i') + '">' + (r.tag === 'official' ? '官方' : '慣例') + '</span>' + r.text + ' — ' + r.basis + '</div>';
  }).join('');
  row.after(exp);
}

/* ── 情境切換 ── */
$('#segctl').addEventListener('click', function (e) {
  var btn = e.target.closest('.scbtn');
  if (!btn || btn.classList.contains('on')) return;
  cancelTimers();
  stopInference();
  cur = btn.getAttribute('data-scn');
  document.querySelectorAll('.scbtn').forEach(function (b) { b.classList.toggle('on', b === btn); });
  renderAll();
  var MSG = { stable: '已切換情境：現況穩定 — 全作業線正常', rain: '已切換情境：強降雨逼近 — 3 項作業停工、1 項加派', typhoon: '已切換情境：颱風外圍 — 全港停止作業預備' };
  toast(MSG[cur]);
});

/* ── 時間軸游標（0-55% = ConvLSTM 0-90min；55-77.5% = +3h；77.5-100% = +6h）── */
var tl = $('#tl'), knob = $('#tlknob'), bub = $('#tlbub');
var pct = 20;
function updateBubble() {
  var sc = SCN[cur], txt, zone;
  if (pct <= 55) {
    var min = Math.round(pct / 55 * 90 / 5) * 5;
    txt = (min === 0 ? 'NOW' : '+' + min + ' min') + ' · ConvLSTM · ' + sc.nowcast.rainLevel;
    zone = 'N';
  } else if (pct <= 77.5) {
    txt = '+3h · CWA · ' + sc.cwa[0].rainLevel; zone = '3';
  } else {
    txt = '+6h · CWA · ' + sc.cwa[1].rainLevel; zone = '6';
  }
  knob.style.left = pct + '%';
  bub.style.left = Math.min(Math.max(pct, 12), 88) + '%';
  bub.textContent = txt;
  tl.setAttribute('aria-valuenow', String(Math.round(pct)));
  $('#hN').classList.toggle('hl', zone === 'N');
  $('#h3').classList.toggle('hl', zone === '3');
  $('#h6').classList.toggle('hl', zone === '6');
}
function setPctFromEvent(e) {
  var r = tl.getBoundingClientRect();
  pct = Math.min(100, Math.max(0, (e.clientX - r.left) / r.width * 100));
  updateBubble();
}
var dragging = false;
tl.addEventListener('pointerdown', function (e) {
  dragging = true;
  try { tl.setPointerCapture(e.pointerId); } catch (_) { /* 合成事件/邊界情況無 active pointer */ }
  setPctFromEvent(e);
});
tl.addEventListener('pointermove', function (e) { if (dragging) setPctFromEvent(e); });
tl.addEventListener('pointerup', function () { dragging = false; });
tl.addEventListener('keydown', function (e) {
  if (e.key === 'ArrowLeft') { pct = Math.max(0, pct - 2.5); updateBubble(); e.preventDefault(); }
  if (e.key === 'ArrowRight') { pct = Math.min(100, pct + 2.5); updateBubble(); e.preventDefault(); }
});

/* ── 模型更新（自動倒數 10:00 → 推論中 → 微調 + toast → 重置）── */
var TOTAL = 600, remain = TOTAL, inferring = false, cntEl = $('#cnt'), ringEl = $('#ring');
function fmt(s) { return String(Math.floor(s / 60)).padStart(2, '0') + ':' + String(s % 60).padStart(2, '0'); }
function paintRing() {
  ringEl.style.setProperty('--pp', (remain / TOTAL * 100) + '%');
  $('#cntT').textContent = inferring ? '推論中' : fmt(remain);
}
function stopInference() {
  inferring = false; cntEl.classList.remove('running');
  paintRing();
}
function runInference() {
  if (inferring) return;
  inferring = true; cntEl.classList.add('running');
  remain = TOTAL; paintRing();
  later(function () {
    inferring = false; cntEl.classList.remove('running');
    /* 微調：windAvg/windGust ±0.2-0.4 視覺抖動（不改燈號、不改資料源） */
    var sc = SCN[cur], j = function (v, d) { return Math.max(0, v + (Math.random() * 0.2 + 0.2) * d); };
    var d = Math.random() > 0.5 ? 1 : -1;
    $('#wxavg').textContent = j(sc.nowcast.windAvg, d).toFixed(1);
    $('#wxgust').textContent = j(sc.nowcast.windGust, d).toFixed(1);
    var now = new Date();
    toast('ConvLSTM 已更新 · ' + String(now.getHours()).padStart(2, '0') + ':' + String(now.getMinutes()).padStart(2, '0') + ' 推論完成');
    paintRing();
  }, RM ? 0 : 2000);
}
setInterval(function () {
  if (inferring) return;
  remain -= 1;
  if (remain <= 0) { runInference(); return; }
  paintRing();
}, 1000);
paintRing();

/* 供驗收腳本觸發（不出現在 UI）：window.__forceUpdate() 立即模擬倒數歸零 */
window.__forceUpdate = runInference;

/* ── 初始 ── */
renderAll();
if (window.LiquidGlass && window.LiquidGlass.init) window.LiquidGlass.init();
</script>
